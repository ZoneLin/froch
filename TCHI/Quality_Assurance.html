<script type="text/javascript">
var currentQA = '';

function showQA(suffix) {
  var ids = ['Default','01','02','03','04','05','06'];
  for (var i = 0; i < ids.length; i++) {
    var el = document.getElementById('QA' + ids[i]);
    if (el) el.style.display = 'none';
  }
  document.getElementById('QA' + suffix).style.display = '';

  var btns = ['01','02','03','04','05','06'];
  for (var i = 0; i < btns.length; i++) {
    var btn = document.getElementById('Quality_Assurance_Image' + btns[i]);
    if (btn) btn.className = 'Top_Font01 Quality_Assurance_Input_Submit01';
  }
  if (suffix != 'Default') {
    document.getElementById('Quality_Assurance_Image' + suffix).className = 'Top_Font01 Quality_Assurance_Input_Submit02';
  }

  currentQA = suffix;
}

function Quality_Assurance_SetBGImage(name, filename) {
  var suffix = name.replace('Quality_Assurance_Image', '');
  if (suffix != currentQA) {
    document.getElementById(name).style.backgroundImage = "URL('" + filename + "')";
  }
}
