<script language="JavaScript" type="text/javascript">
var currentImage = '';

function Quality_Assurance_SetBGImage(name,filename){
   if(name!=currentImage)
   {
      filename="URL('" + filename + "')";
      document.getElementById(name).style.backgroundImage=filename;
   }
}

function showImage(imageId){
   var names = ['Quality_Assurance_Image01','Quality_Assurance_Image02','Quality_Assurance_Image03','Quality_Assurance_Image04','Quality_Assurance_Image05','Quality_Assurance_Image06'];
   for(var i=0;i<names.length;i++){
      var div = document.getElementById('div_' + names[i]);
      if(div){
         if(names[i]==imageId){
            div.style.display='';
            document.getElementById(names[i]).className='Quality_Assurance_Input_Submit02';
            document.getElementById(names[i]).style.backgroundImage='URL("../Image/Quality_Assurance/Button02.jpg")';
         } else {
            div.style.display='none';
            document.getElementById(names[i]).className='Quality_Assurance_Input_Submit01';
            document.getElementById(names[i]).style.backgroundImage='URL("../Image/Quality_Assurance/Button01.jpg")';
         }
      }
   }
   var defaultIntro = document.getElementById('div_Quality_Assurance_Intro');
   if(defaultIntro){
      defaultIntro.style.display='none';
   }
   currentImage = imageId;
}
</script>
